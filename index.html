<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Nova</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>🎬 Movie Paradise</h1>
    <input 
      type="text" 
      id="search" 
      placeholder="Search movies in MovieSphere..."
    >
  </header>

  <!-- LOADING -->
  <div id="loading" class="hidden">Loading...</div>

  <!-- MOVIE LIST -->
  <main id="movies"></main>

  <!-- FULLSCREEN MOVIE VIEW -->
  <div id="modal">
    <div id="movieDetails"></div>
    <span id="close">✖</span>
  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
